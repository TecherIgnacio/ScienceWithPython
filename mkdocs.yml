site_name: Ciencia con Python
site_url: https://techerignacio.github.io/ScienceWithPython/
site_description: Aprende simulación científica con Python
site_author: Tangrama

docs_dir: docs
site_dir: _site

theme:
  name: material
  language: es
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Inicio: index.md
  - "🔧 Configuración": setup/index.md
  - "🐍 Módulo 1 · Introducción":
    - "📖 Teoría": mod01/index.md
    - "🔬 Ejemplos": mod01/ejemplos.md
    - "✏️ Ejercicios": mod01/ejercicios.md
    - "🏆 Retos Extra": mod01/extras.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/main.js
